<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <rect width="840" height="380" fill="#ffffff"/>
  <text x="420" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Secrets Store CSI Driver + Key Vault + Workload Identity</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#6b7b8c"/></marker></defs>

  <!-- Pod + SA -->
  <rect x="30" y="80" width="200" height="150" rx="10" fill="#eef4fb" stroke="#9cbde0"/>
  <text x="130" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#2e6bb3">Pod (notiflex-api)</text>
  <text x="130" y="128" text-anchor="middle" font-size="10.5" fill="#555">ServiceAccount</text>
  <text x="130" y="144" text-anchor="middle" font-size="10.5" fill="#555">azure.workload.identity/use</text>
  <rect x="55" y="158" width="150" height="52" rx="6" fill="#fff" stroke="#9cbde0"/>
  <text x="130" y="180" text-anchor="middle" font-size="11">CSI 볼륨 마운트</text>
  <text x="130" y="197" text-anchor="middle" font-size="10" fill="#777">/mnt/secrets/valkey-password</text>

  <!-- Azure AD -->
  <rect x="320" y="70" width="180" height="70" rx="8" fill="#fdf6ec" stroke="#e0b878"/>
  <text x="410" y="95" text-anchor="middle" font-size="12.5" font-weight="700" fill="#c07d1a">Azure AD</text>
  <text x="410" y="113" text-anchor="middle" font-size="10" fill="#666">federated credential</text>
  <text x="410" y="128" text-anchor="middle" font-size="10" fill="#666">→ Managed Identity</text>

  <!-- Key Vault -->
  <rect x="600" y="70" width="200" height="70" rx="8" fill="#f2f9f4" stroke="#8bbf9c"/>
  <text x="700" y="95" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2f7d4f">Azure Key Vault</text>
  <text x="700" y="113" text-anchor="middle" font-size="10" fill="#666">kv-gitaiops-book (RBAC)</text>
  <text x="700" y="128" text-anchor="middle" font-size="10" fill="#666">secret: valkey-password</text>

  <!-- CSI driver -->
  <rect x="320" y="260" width="480" height="56" rx="8" fill="#f7f7f7" stroke="#ccc"/>
  <text x="560" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#555">Secrets Store CSI Driver (AKS 애드온, DaemonSet)</text>
  <text x="560" y="302" text-anchor="middle" font-size="10.5" fill="#777">SecretProviderClass가 "어떤 Vault의 어떤 시크릿"을 정의</text>

  <!-- arrows -->
  <g stroke="#6b7b8c" stroke-width="2" fill="none">
    <path d="M230 120 L316 105" marker-end="url(#a)"/>
    <path d="M500 105 L596 105" marker-end="url(#a)"/>
    <path d="M410 140 L410 258" marker-end="url(#a)"/>
    <path d="M700 140 L700 258" marker-end="url(#a)"/>
    <path d="M330 288 L232 200" marker-end="url(#a)"/>
  </g>
  <text x="270" y="98" font-size="9.5" fill="#2e6bb3">OIDC 토큰</text>
  <text x="520" y="98" font-size="9.5" fill="#c07d1a">인증</text>

  <text x="420" y="352" text-anchor="middle" font-size="11.5" fill="#777">SA 키(JSON) 없이 OIDC 토큰으로 인증 → CSI가 시크릿을 파일로 마운트 → 앱은 파일을 읽는다</text>
</svg>
