<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <rect width="820" height="360" fill="#ffffff"/>
  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Pod 간 상태 공유: 인메모리 → Valkey</text>

  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="4.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6b7b8c"/></marker></defs>

  <!-- Before -->
  <text x="205" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#b23b3b">Before · 인메모리 카운터</text>
  <rect x="30" y="78" width="350" height="250" rx="10" fill="#fdf3f2" stroke="#e0b4b0"/>
  <rect x="70" y="110" width="120" height="60" rx="6" fill="#fff" stroke="#c9938e"/>
  <text x="130" y="134" text-anchor="middle" font-size="12">Pod A</text>
  <text x="130" y="154" text-anchor="middle" font-size="11" fill="#b23b3b">counter=2</text>
  <rect x="220" y="110" width="120" height="60" rx="6" fill="#fff" stroke="#c9938e"/>
  <text x="280" y="134" text-anchor="middle" font-size="12">Pod B</text>
  <text x="280" y="154" text-anchor="middle" font-size="11" fill="#b23b3b">counter=1</text>
  <text x="205" y="210" text-anchor="middle" font-size="12" fill="#333">요청1→A→ID:1  요청2→B→ID:1</text>
  <text x="205" y="232" text-anchor="middle" font-size="13" fill="#b23b3b" font-weight="700">⚠ 같은 ID 중복 생성</text>
  <text x="205" y="262" text-anchor="middle" font-size="11.5" fill="#8a5a56">각 Pod가 독립 메모리 → 상태 불일치</text>
  <text x="205" y="284" text-anchor="middle" font-size="11.5" fill="#8a5a56">A에 POST한 값이 B의 GET에 안 보임</text>

  <!-- After -->
  <text x="615" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#2f7d4f">After · Valkey INCR</text>
  <rect x="440" y="78" width="350" height="250" rx="10" fill="#f2f9f4" stroke="#a9d3b8"/>
  <rect x="475" y="105" width="110" height="50" rx="6" fill="#fff" stroke="#8bbf9c"/>
  <text x="530" y="135" text-anchor="middle" font-size="12">Pod A</text>
  <rect x="645" y="105" width="110" height="50" rx="6" fill="#fff" stroke="#8bbf9c"/>
  <text x="700" y="135" text-anchor="middle" font-size="12">Pod B</text>
  <rect x="545" y="215" width="140" height="56" rx="8" fill="#eafaf0" stroke="#5fb783"/>
  <text x="615" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#2f7d4f">Valkey</text>
  <text x="615" y="258" text-anchor="middle" font-size="10.5" fill="#555">INCR notiflex:id</text>
  <path d="M530 155 L600 211" stroke="#6b7b8c" stroke-width="2" marker-end="url(#a)"/>
  <path d="M700 155 L630 211" stroke="#6b7b8c" stroke-width="2" marker-end="url(#a)"/>
  <text x="615" y="300" text-anchor="middle" font-size="12" fill="#2f7d4f" font-weight="600">✓ 원자적 증가 → 순차 ID(1,2,3…)</text>
  <text x="615" y="320" text-anchor="middle" font-size="11" fill="#4a7d5e">중앙 저장소로 모든 Pod가 상태 공유</text>
</svg>
