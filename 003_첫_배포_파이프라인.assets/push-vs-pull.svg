<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="820" height="380" fill="#ffffff"/>

  <!-- Left: Push -->
  <text x="205" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#b23b3b">Push 기반 (명령형)</text>
  <rect x="70" y="60" width="270" height="250" rx="10" fill="#fdf3f2" stroke="#e0b4b0"/>

  <rect x="120" y="80" width="170" height="42" rx="6" fill="#ffffff" stroke="#c9938e"/>
  <text x="205" y="106" text-anchor="middle" font-size="14" fill="#333">개발자 / 로컬 PC</text>

  <text x="205" y="146" text-anchor="middle" font-size="13" fill="#8a5a56">kubectl / gcloud (직접 실행)</text>
  <path d="M205 128 L205 160" stroke="#b23b3b" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="120" y="168" width="170" height="42" rx="6" fill="#ffffff" stroke="#c9938e"/>
  <text x="205" y="194" text-anchor="middle" font-size="14" fill="#333">클러스터</text>
  <path d="M205 210 L205 234" stroke="#b23b3b" stroke-width="2" marker-end="url(#ar)"/>

  <text x="205" y="252" text-anchor="middle" font-size="12.5" fill="#b23b3b" font-weight="600">⚠ 이력 없음 · 드리프트</text>
  <text x="205" y="274" text-anchor="middle" font-size="11.5" fill="#8a5a56">이전 상태를 몰라 롤백 불가</text>
  <text x="205" y="292" text-anchor="middle" font-size="11.5" fill="#8a5a56">Git ≠ 실제 클러스터 상태</text>

  <!-- Right: Pull -->
  <text x="615" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#2f7d4f">Pull 기반 (GitOps)</text>
  <rect x="480" y="60" width="270" height="250" rx="10" fill="#f2f9f4" stroke="#a9d3b8"/>

  <rect x="530" y="80" width="170" height="38" rx="6" fill="#ffffff" stroke="#8bbf9c"/>
  <text x="615" y="104" text-anchor="middle" font-size="14" fill="#333">개발자 → Git (PR)</text>
  <path d="M615 118 L615 140" stroke="#2f7d4f" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="530" y="146" width="170" height="38" rx="6" fill="#ffffff" stroke="#8bbf9c"/>
  <text x="615" y="170" text-anchor="middle" font-size="14" fill="#333">ArgoCD (감시·동기화)</text>
  <path d="M615 184 L615 206" stroke="#2f7d4f" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="530" y="212" width="170" height="38" rx="6" fill="#ffffff" stroke="#8bbf9c"/>
  <text x="615" y="236" text-anchor="middle" font-size="14" fill="#333">클러스터</text>

  <text x="615" y="276" text-anchor="middle" font-size="12.5" fill="#2f7d4f" font-weight="600">✓ Git = 단일 진실 공급원</text>
  <text x="615" y="296" text-anchor="middle" font-size="11.5" fill="#4a7d5e">git revert 만으로 롤백</text>

  <!-- center arrow -->
  <text x="410" y="180" text-anchor="middle" font-size="22" fill="#999">→</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#b23b3b"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2f7d4f"/></marker>
  </defs>
</svg>
